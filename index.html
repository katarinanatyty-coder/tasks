<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Планировщик дел</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8f8f6;color:#1a1a18;min-height:100vh;padding:1.25rem}
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#f1efe8;
  --color-background-tertiary:#f8f8f6;
  --color-text-primary:#1a1a18;
  --color-text-secondary:#5f5e5a;
  --color-border-tertiary:rgba(0,0,0,.1);
  --color-border-secondary:rgba(0,0,0,.2);
  --color-border-primary:rgba(0,0,0,.3);
  --border-radius-md:8px;
  --border-radius-lg:12px;
  --font-sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --color-background-primary:#1e1e1c;
    --color-background-secondary:#2a2a28;
    --color-background-tertiary:#141412;
    --color-text-primary:#f0ede6;
    --color-text-secondary:#9b9a95;
    --color-border-tertiary:rgba(255,255,255,.1);
    --color-border-secondary:rgba(255,255,255,.18);
    --color-border-primary:rgba(255,255,255,.28);
  }
  body{background:#141412;color:#f0ede6}
}
.sr-only{position:absolute;width:1px;height:1px;padding:0;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.app{max-width:960px;margin:0 auto}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;gap:8px;flex-wrap:wrap}
.nav-grp{display:flex;align-items:center;gap:6px}
.btn{background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:5px 11px;font-size:12px;cursor:pointer;color:var(--color-text-primary);display:inline-flex;align-items:center;gap:5px;transition:background .12s}
.btn:hover{background:var(--color-background-secondary)}
.btn-icon{background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:5px 9px;cursor:pointer;color:var(--color-text-primary);display:inline-flex;align-items:center;transition:background .12s}
.btn-icon:hover{background:var(--color-background-secondary)}
.period-lbl{font-size:14px;font-weight:500;color:var(--color-text-primary);min-width:155px;text-align:center}
.view-toggle{display:flex;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);overflow:hidden}
.vbtn{background:transparent;border:none;padding:5px 13px;font-size:12px;cursor:pointer;color:var(--color-text-secondary);transition:background .12s}
.vbtn.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
.cats-bar{display:flex;gap:6px;margin-bottom:.75rem;flex-wrap:wrap;align-items:center}
.cat-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:500;border:0.5px solid transparent;cursor:pointer;transition:opacity .15s}
.cat-pill.off{opacity:.35}
.add-cat-btn{background:transparent;border:0.5px dashed var(--color-border-secondary);border-radius:20px;padding:3px 11px;font-size:11px;cursor:pointer;color:var(--color-text-secondary);display:inline-flex;align-items:center;gap:4px}
.add-cat-btn:hover{border-color:var(--color-border-primary);color:var(--color-text-primary)}
.summary-section{margin-bottom:.75rem}
.sum-row{display:grid;gap:8px;margin-bottom:8px}
.sum-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:.75rem 1rem}
.sum-card-head{display:flex;align-items:center;gap:8px;margin-bottom:.6rem}
.sum-cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sum-cat-name{font-size:13px;font-weight:500;color:var(--color-text-primary)}
.sum-bars{display:flex;flex-direction:column;gap:3px}
.sum-bar-row{display:flex;align-items:center;gap:6px}
.sum-bar-lbl{font-size:10px;color:var(--color-text-secondary);width:32px;flex-shrink:0}
.sum-bar-wrap{flex:1;height:5px;background:var(--color-border-tertiary);border-radius:3px;overflow:hidden}
.sum-bar-fill{height:100%;border-radius:3px;transition:width .4s}
.sum-bar-pct{font-size:10px;font-weight:500;width:28px;text-align:right;flex-shrink:0}
.sum-period{font-size:10px;color:var(--color-text-secondary);margin-bottom:2px;text-transform:uppercase;letter-spacing:.4px;margin-top:6px}
.week-wrap{position:relative}
.week-grid{display:grid;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.gh{background:var(--color-background-secondary);padding:8px 6px;text-align:center;border-bottom:0.5px solid var(--color-border-tertiary);border-right:0.5px solid var(--color-border-tertiary)}
.gh:last-child{border-right:none}
.gh .dn{font-size:10px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.4px}
.gh .dd{font-size:18px;font-weight:500;color:var(--color-text-primary);line-height:1.2;margin-top:1px}
.gh.today-h .dd{color:#fff;background:#534AB7;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:2px auto 0;font-size:14px}
.row-lbl{padding:6px 8px;font-size:10px;border-right:0.5px solid var(--color-border-tertiary);border-bottom:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;gap:3px}
.row-lbl .rn{font-size:11px;font-weight:500;color:var(--color-text-primary)}
.pf-mini{display:flex;flex-direction:column;gap:2px;margin-top:2px}
.pf-row{display:flex;align-items:center;gap:4px}
.pf-lbl{font-size:9px;color:var(--color-text-secondary);width:22px}
.pf-bar{flex:1;height:3px;background:var(--color-border-tertiary);border-radius:2px;overflow:hidden}
.pf-fill{height:100%;border-radius:2px}
.pf-pct{font-size:9px;color:var(--color-text-secondary);width:22px;text-align:right}
.day-cell{border-right:0.5px solid var(--color-border-tertiary);border-bottom:0.5px solid var(--color-border-tertiary);padding:5px;min-height:80px;cursor:pointer;transition:background .1s;position:relative}
.day-cell:last-child{border-right:none}
.day-cell:hover .add-hint{opacity:1}
.day-cell.today-c{background:rgba(83,74,183,.08)}
.day-cell.inactive-c{background:var(--color-background-secondary);cursor:default;opacity:.45}
.task-item{font-size:10px;padding:3px 6px;border-radius:4px;margin-bottom:2px;display:flex;align-items:flex-start;gap:4px;line-height:1.3;cursor:pointer}
.task-item .ti-check{width:11px;height:11px;border-radius:2px;border:1px solid currentColor;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center}
.task-item.fact-done .ti-check::after{content:'✓';font-size:8px}
.task-item.fact-done span{opacity:.5;text-decoration:line-through}
.add-hint{font-size:10px;color:var(--color-text-secondary);display:flex;align-items:center;gap:2px;opacity:0;transition:opacity .15s;cursor:pointer;padding:2px 3px;border-radius:3px}
.add-hint:hover{background:var(--color-border-tertiary)}
.prog-section{padding:10px 1rem;background:var(--color-background-primary);border-top:0.5px solid var(--color-border-tertiary)}
.prog-hd{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:7px;text-transform:uppercase;letter-spacing:.4px}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:5px}
.prog-row:last-child{margin-bottom:0}
.pr-name{font-size:11px;color:var(--color-text-secondary);width:55px;flex-shrink:0}
.pr-bars{flex:1;display:flex;flex-direction:column;gap:2px}
.pr-bar-r{display:flex;align-items:center;gap:5px}
.pr-bar-l{font-size:9px;color:var(--color-text-secondary);width:24px}
.pr-bar-w{flex:1;height:4px;background:var(--color-border-tertiary);border-radius:2px;overflow:hidden}
.pr-bar-f{height:100%;border-radius:2px;transition:width .4s}
.pr-pct{font-size:10px;font-weight:500;color:var(--color-text-primary);width:28px;text-align:right}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.mgh{background:var(--color-background-secondary);padding:7px 6px;text-align:center;border-bottom:0.5px solid var(--color-border-tertiary);border-right:0.5px solid var(--color-border-tertiary);font-size:10px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.3px}
.mgh:last-child{border-right:none}
.mcell{border-right:0.5px solid var(--color-border-tertiary);border-bottom:0.5px solid var(--color-border-tertiary);padding:5px 7px;min-height:72px;cursor:pointer;transition:background .1s}
.mcell:nth-child(7n){border-right:none}
.mcell:hover{background:var(--color-background-secondary)}
.mcell.other-m .md{opacity:.3}
.mcell.today-m .md-inner{background:#534AB7;color:#fff;width:22px;height:22px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center}
.md{font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px}
.mdots{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px}
.mdot{width:6px;height:6px;border-radius:50%}
.modal-wrap{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:1000}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-secondary);padding:1.25rem 1.5rem;width:360px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:500;margin-bottom:.9rem}
.fld{margin-bottom:.65rem}
.fld label{display:block;font-size:11px;color:var(--color-text-secondary);margin-bottom:3px}
.fld input,.fld select{width:100%;padding:7px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px}
.cswatch-row{display:flex;gap:7px;flex-wrap:wrap}
.cswatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .12s}
.cswatch.sel{border-color:var(--color-text-primary)}
.day-cks{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px}
.day-ck{display:flex;align-items:center;gap:3px;font-size:11px;cursor:pointer}
.day-ck input{width:11px;height:11px;cursor:pointer}
.mact{display:flex;gap:7px;justify-content:flex-end;margin-top:.9rem}
.plan-grid{display:flex;flex-direction:column;gap:4px;margin:.5rem 0}
.plan-item{display:flex;align-items:center;gap:8px;padding:5px 8px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);font-size:12px}
.plan-item .pi-name{flex:1;color:var(--color-text-primary)}
</style>
</head>
<body>
<div class="app">
<h1 class="sr-only">Планировщик дел — план и факт</h1>
<div class="toolbar">
  <div class="nav-grp">
    <button class="btn-icon" id="prev-btn" title="Назад"><i class="ti ti-chevron-left"></i></button>
    <span class="period-lbl" id="period-lbl"></span>
    <button class="btn-icon" id="next-btn" title="Вперёд"><i class="ti ti-chevron-right"></i></button>
    <button class="btn" id="today-btn"><i class="ti ti-calendar-event"></i> Сегодня</button>
  </div>
  <div class="view-toggle">
    <button class="vbtn active" id="wb">Неделя</button>
    <button class="vbtn" id="mb">Месяц</button>
  </div>
</div>
<div class="cats-bar" id="cats-bar"></div>
<div class="summary-section" id="summary"></div>
<div id="main-grid"></div>
<div id="modal-root"></div>
</div>

<script>
const DAYS=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const MONTHS_G=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const MONTHS_N=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const COLS=['#534AB7','#1D9E75','#D85A30','#D4537E','#378ADD','#639922','#BA7517'];
const BG_COLS=['#EEEDFE','#E1F5EE','#FAECE7','#FBEAF0','#E6F1FB','#EAF3DE','#FAEEDA'];

function loadState(){
  try{const s=localStorage.getItem('planner_v1');if(s)return JSON.parse(s);}catch(e){}
  return null;
}
function saveState(){
  try{localStorage.setItem('planner_v1',JSON.stringify({categories:S.categories,fact:S.fact}));}catch(e){}
}

const saved=loadState();
const S={
  view:'week',
  anchor:new Date(),
  activeCats:null,
  modal:null,
  categories: saved?.categories || [
    {id:'c1',name:'Книга',color:'#534AB7',bg:'#EEEDFE',days:[1,2,3,4,5],
     plan:[{id:'p1',text:'Читать 30 мин'},{id:'p2',text:'Конспект главы'}]},
    {id:'c2',name:'Java',color:'#1D9E75',bg:'#E1F5EE',days:[1,3,5],
     plan:[{id:'p3',text:'Теория (1 час)'},{id:'p4',text:'Практика — задача'}]},
    {id:'c3',name:'Спорт',color:'#D85A30',bg:'#FAECE7',days:[2,4,6],
     plan:[{id:'p5',text:'Тренировка 45 мин'}]},
  ],
  fact: saved?.fact || {},
};

function td(){return new Date(new Date().setHours(0,0,0,0))}
function dk(d){return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`}
function wstart(d){const r=new Date(d);const dw=r.getDay()||7;r.setDate(r.getDate()-dw+1);r.setHours(0,0,0,0);return r}
function add(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function wdays(a){const s=wstart(a);return Array.from({length:7},(_,i)=>add(s,i))}
function factKey(catId,planId,dateK){return `${catId}|${planId}|${dateK}`}
function isFact(catId,planId,dateK){return !!S.fact[factKey(catId,planId,dateK)]}
function toggleFact(catId,planId,dateK){
  const k=factKey(catId,planId,dateK);
  S.fact[k]=!S.fact[k];
  saveState();render();
}

function calcPeriod(cat,year,month){
  let planDays=0,factDone=0;
  const daysInMonth=new Date(year,month+1,0).getDate();
  for(let d=1;d<=daysInMonth;d++){
    const date=new Date(year,month,d);
    const dow=date.getDay()||7;
    if(cat.days.includes(dow)){
      planDays++;
      cat.plan.forEach(p=>{if(isFact(cat.id,p.id,dk(date)))factDone++;});
    }
  }
  const planTotal=planDays*cat.plan.length;
  return {planTotal,factDone,pct:planTotal>0?Math.round(factDone/planTotal*100):0};
}
function calcWeek(cat,anchor){
  const days=wdays(anchor);let planTotal=0,factDone=0;
  days.forEach(d=>{
    const dow=d.getDay()||7;
    if(cat.days.includes(dow)){
      planTotal+=cat.plan.length;
      cat.plan.forEach(p=>{if(isFact(cat.id,p.id,dk(d)))factDone++;});
    }
  });
  return {planTotal,factDone,pct:planTotal>0?Math.round(factDone/planTotal*100):0};
}

function visCats(){if(!S.activeCats)return S.categories;return S.categories.filter(c=>S.activeCats.includes(c.id))}

function renderCatsBar(){
  const bar=document.getElementById('cats-bar');bar.innerHTML='';
  S.categories.forEach(cat=>{
    const on=!S.activeCats||S.activeCats.includes(cat.id);
    const p=document.createElement('span');
    p.className='cat-pill'+(on?'':' off');
    p.style.background=cat.bg;p.style.color=cat.color;p.style.borderColor=cat.color+'44';
    p.innerHTML=`<span style="width:8px;height:8px;border-radius:50%;background:${cat.color};display:inline-block"></span>${cat.name}`;
    p.onclick=()=>{
      if(!S.activeCats){S.activeCats=[cat.id];}
      else{const i=S.activeCats.indexOf(cat.id);if(i>=0){S.activeCats=S.activeCats.filter(x=>x!==cat.id);if(!S.activeCats.length)S.activeCats=null;}else{S.activeCats=[...S.activeCats,cat.id];if(S.activeCats.length===S.categories.length)S.activeCats=null;}}
      render();
    };
    bar.appendChild(p);
  });
  const ab=document.createElement('button');ab.className='add-cat-btn';
  ab.innerHTML='<i class="ti ti-plus"></i> Категория';
  ab.onclick=()=>{S.modal={type:'add-cat'};renderModal()};
  bar.appendChild(ab);
}

function renderSummary(){
  const el=document.getElementById('summary');const cats=visCats();
  if(!cats.length){el.innerHTML='';return}
  const cm=S.anchor.getMonth(),cy=S.anchor.getFullYear();
  const pm=cm===0?11:cm-1,py=cm===0?cy-1:cy;
  let html='<div class="sum-row" style="grid-template-columns:repeat(auto-fit,minmax(190px,1fr))">';
  cats.forEach(cat=>{
    const wk=calcWeek(cat,S.anchor);
    const cm_=calcPeriod(cat,cy,cm);
    const pm_=calcPeriod(cat,py,pm);
    const hasPrev=pm_.planTotal>0;
    html+=`<div class="sum-card">
      <div class="sum-card-head">
        <span class="sum-cat-dot" style="background:${cat.color}"></span>
        <span class="sum-cat-name">${cat.name}</span>
        <span style="font-size:10px;color:var(--color-text-secondary);margin-left:auto">${cat.plan.length} задач</span>
      </div>
      <div style="display:flex;flex-direction:column;gap:2px">
        <div class="sum-period">Неделя</div>
        <div class="sum-bars">
          <div class="sum-bar-row"><span class="sum-bar-lbl" style="color:${cat.color}">план</span><div class="sum-bar-wrap"><div class="sum-bar-fill" style="width:100%;background:${cat.color}33"></div></div><span class="sum-bar-pct" style="color:${cat.color}">${wk.planTotal}</span></div>
          <div class="sum-bar-row"><span class="sum-bar-lbl">факт</span><div class="sum-bar-wrap"><div class="sum-bar-fill" style="width:${wk.pct}%;background:${cat.color}"></div></div><span class="sum-bar-pct">${wk.pct}%</span></div>
        </div>
        <div class="sum-period">${MONTHS_N[cm]}</div>
        <div class="sum-bars">
          <div class="sum-bar-row"><span class="sum-bar-lbl" style="color:${cat.color}">план</span><div class="sum-bar-wrap"><div class="sum-bar-fill" style="width:100%;background:${cat.color}33"></div></div><span class="sum-bar-pct" style="color:${cat.color}">${cm_.planTotal}</span></div>
          <div class="sum-bar-row"><span class="sum-bar-lbl">факт</span><div class="sum-bar-wrap"><div class="sum-bar-fill" style="width:${cm_.pct}%;background:${cat.color}"></div></div><span class="sum-bar-pct">${cm_.pct}%</span></div>
        </div>
        ${hasPrev?`<div class="sum-period">${MONTHS_N[pm]} (прошлый)</div>
        <div class="sum-bars">
          <div class="sum-bar-row"><span class="sum-bar-lbl" style="color:${cat.color}">план</span><div class="sum-bar-wrap"><div class="sum-bar-fill" style="width:100%;background:${cat.color}33"></div></div><span class="sum-bar-pct" style="color:${cat.color}">${pm_.planTotal}</span></div>
          <div class="sum-bar-row"><span class="sum-bar-lbl">факт</span><div class="sum-bar-wrap"><div class="sum-bar-fill" style="width:${pm_.pct}%;background:${cat.color}"></div></div><span class="sum-bar-pct">${pm_.pct}%</span></div>
        </div>`:''}
      </div>
    </div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}

function renderWeek(){
  const grid=document.getElementById('main-grid');grid.innerHTML='';
  const g=document.createElement('div');g.className='week-grid';
  g.style.gridTemplateColumns=`80px repeat(7,1fr)`;
  const today=td();const days=wdays(S.anchor);const cats=visCats();
  const corner=document.createElement('div');corner.className='gh';corner.style.textAlign='left';
  corner.innerHTML='<span class="dn">Категория</span>';g.appendChild(corner);
  days.forEach((d,i)=>{
    const h=document.createElement('div');
    h.className='gh'+(d.getTime()===today.getTime()?' today-h':'');
    h.innerHTML=`<div class="dn">${DAYS[i]}</div><div class="dd">${d.getDate()}</div>`;
    g.appendChild(h);
  });
  cats.forEach(cat=>{
    const wk=calcWeek(cat,S.anchor);
    const lbl=document.createElement('div');lbl.className='row-lbl';
    lbl.innerHTML=`<div style="display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:${cat.color};flex-shrink:0"></span><span class="rn">${cat.name}</span></div>
    <div class="pf-mini">
      <div class="pf-row"><span class="pf-lbl" style="color:${cat.color}">пл</span><div class="pf-bar"><div class="pf-fill" style="width:100%;background:${cat.color}33"></div></div><span class="pf-pct">${wk.planTotal}</span></div>
      <div class="pf-row"><span class="pf-lbl">фт</span><div class="pf-bar"><div class="pf-fill" style="width:${wk.pct}%;background:${cat.color}"></div></div><span class="pf-pct">${wk.pct}%</span></div>
    </div>
    <button style="font-size:9px;color:var(--color-text-secondary);background:transparent;border:0.5px solid var(--color-border-tertiary);border-radius:4px;padding:2px 5px;cursor:pointer;margin-top:2px" onclick="openCatPlan('${cat.id}')"><i class="ti ti-list" style="font-size:10px"></i> план</button>`;
    g.appendChild(lbl);
    days.forEach(d=>{
      const dow=d.getDay()||7;const active=cat.days.includes(dow);
      const cell=document.createElement('div');
      cell.className='day-cell'+(d.getTime()===today.getTime()?' today-c':'')+(active?'':' inactive-c');
      if(active){
        const dateK=dk(d);
        cat.plan.forEach(p=>{
          const done=isFact(cat.id,p.id,dateK);
          const item=document.createElement('div');
          item.className='task-item'+(done?' fact-done':'');
          item.style.background=done?cat.color+'22':cat.bg;item.style.color=cat.color;
          item.innerHTML=`<div class="ti-check" style="border-color:${cat.color}">${done?'<span style="font-size:8px">✓</span>':''}</div><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.text}</span>`;
          item.onclick=(e)=>{e.stopPropagation();toggleFact(cat.id,p.id,dateK)};
          cell.appendChild(item);
        });
        if(!cat.plan.length){
          const hint=document.createElement('div');hint.className='add-hint';
          hint.innerHTML='<i class="ti ti-plus" style="font-size:10px"></i> добавить план';
          hint.onclick=(e)=>{e.stopPropagation();openCatPlan(cat.id)};
          cell.appendChild(hint);
        }
      }
      g.appendChild(cell);
    });
  });
  const prog=document.createElement('div');prog.className='prog-section';prog.style.gridColumn='1/-1';
  let ph='<div class="prog-hd">Прогресс недели — план vs факт</div>';
  cats.forEach(cat=>{
    const wk=calcWeek(cat,S.anchor);
    ph+=`<div class="prog-row"><span class="pr-name">${cat.name}</span>
    <div class="pr-bars">
      <div class="pr-bar-r"><span class="pr-bar-l" style="color:${cat.color}">план</span><div class="pr-bar-w"><div class="pr-bar-f" style="width:100%;background:${cat.color}33"></div></div><span class="pr-pct" style="color:${cat.color}">${wk.planTotal}</span></div>
      <div class="pr-bar-r"><span class="pr-bar-l">факт</span><div class="pr-bar-w"><div class="pr-bar-f" style="width:${wk.pct}%;background:${cat.color}"></div></div><span class="pr-pct">${wk.pct}%</span></div>
    </div></div>`;
  });
  prog.innerHTML=ph;g.appendChild(prog);
  grid.appendChild(g);
}

function renderMonth(){
  const grid=document.getElementById('main-grid');grid.innerHTML='';
  const g=document.createElement('div');g.className='month-grid';
  const today=td();const year=S.anchor.getFullYear(),month=S.anchor.getMonth();
  const first=new Date(year,month,1);const last=new Date(year,month+1,0);
  const startDow=(first.getDay()||7)-1;
  DAYS.forEach(d=>{const h=document.createElement('div');h.className='mgh';h.textContent=d;g.appendChild(h)});
  for(let i=0;i<startDow;i++){const c=document.createElement('div');c.className='mcell other-m';const pd=new Date(year,month,1-startDow+i);c.innerHTML=`<div class="md">${pd.getDate()}</div>`;g.appendChild(c)}
  const cats=visCats();
  for(let d=1;d<=last.getDate();d++){
    const date=new Date(year,month,d);const isT=date.getTime()===today.getTime();
    const cell=document.createElement('div');cell.className='mcell'+(isT?' today-m':'');
    const mdiv=document.createElement('div');mdiv.className='md';
    const inner=document.createElement('span');inner.className='md-inner';inner.textContent=d;
    mdiv.appendChild(inner);cell.appendChild(mdiv);
    const dots=document.createElement('div');dots.className='mdots';
    const dow=date.getDay()||7;
    cats.forEach(cat=>{
      if(cat.days.includes(dow)){
        const dateK=dk(date);
        const fc=cat.plan.filter(p=>isFact(cat.id,p.id,dateK)).length;
        const pc=cat.plan.length;
        const dot=document.createElement('div');dot.className='mdot';
        dot.style.background=pc>0&&fc===pc?cat.color:fc>0?cat.color+'88':cat.color+'33';
        dot.title=`${cat.name}: ${fc}/${pc}`;
        dots.appendChild(dot);
      }
    });
    cell.appendChild(dots);
    cell.onclick=()=>{S.anchor=date;S.view='week';document.getElementById('wb').classList.add('active');document.getElementById('mb').classList.remove('active');updatePeriodLabel();render()};
    g.appendChild(cell);
  }
  const tot=startDow+last.getDate();const rem=tot%7===0?0:7-tot%7;
  for(let i=1;i<=rem;i++){const c=document.createElement('div');c.className='mcell other-m';c.innerHTML=`<div class="md">${i}</div>`;g.appendChild(c)}
  grid.appendChild(g);
}

function renderModal(){
  const root=document.getElementById('modal-root');root.innerHTML='';
  if(!S.modal)return;
  const m=S.modal;
  const ov=document.createElement('div');ov.className='modal-wrap';
  ov.onclick=(e)=>{if(e.target===ov){S.modal=null;renderModal()}};

  if(m.type==='cat-plan'){
    const cat=S.categories.find(c=>c.id===m.catId);if(!cat)return;
    let planHTML=cat.plan.map((p,i)=>`<div class="plan-item">
      <span class="pi-name">${p.text}</span>
      <button style="font-size:10px;background:transparent;border:none;cursor:pointer;color:var(--color-text-secondary);padding:2px 4px" onclick="removePlanItem('${cat.id}',${i})"><i class="ti ti-trash" style="font-size:12px"></i></button>
    </div>`).join('');
    ov.innerHTML=`<div class="modal">
      <h3 style="color:${cat.color}"><i class="ti ti-list" style="font-size:15px"></i> План — ${cat.name}</h3>
      <div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:.5rem">Задачи отображаются в каждом рабочем дне. Кликни на задачу в сетке, чтобы отметить факт.</div>
      <div class="plan-grid" id="plan-items">${planHTML||'<div style="font-size:12px;color:var(--color-text-secondary);padding:8px 0">Нет задач</div>'}</div>
      <div class="fld"><label>Новая задача</label><input id="pi-input" placeholder="Что делать в этот день..." /></div>
      <div class="mact">
        <button class="btn" onclick="closeModal()">Закрыть</button>
        <button class="btn" style="border-color:${cat.color};color:${cat.color}" onclick="addPlanItem('${cat.id}')"><i class="ti ti-plus"></i> Добавить</button>
      </div>
    </div>`;
    const inp=ov.querySelector('#pi-input');
    if(inp)inp.addEventListener('keydown',e=>{if(e.key==='Enter')addPlanItem(cat.id)});
  }

  if(m.type==='add-cat'){
    ov.innerHTML=`<div class="modal">
      <h3>Новая категория</h3>
      <div class="fld"><label>Название</label><input id="cn-i" placeholder="Python, Медитация..."/></div>
      <div class="fld"><label>Цвет</label><div class="cswatch-row">${COLS.map((c,i)=>`<div class="cswatch${i===0?' sel':''}" style="background:${c}" data-c="${c}" data-bg="${BG_COLS[i]}" onclick="selColor(this)"></div>`).join('')}</div></div>
      <div class="fld"><label>Дни недели</label><div class="day-cks">${DAYS.map((d,i)=>`<label class="day-ck"><input type="checkbox" class="dck" value="${i+1}" ${i<5?'checked':''}/>${d}</label>`).join('')}</div></div>
      <div class="mact">
        <button class="btn" onclick="closeModal()">Отмена</button>
        <button class="btn" style="border-color:#534AB7;color:#534AB7" onclick="saveCat()"><i class="ti ti-check"></i> Создать</button>
      </div>
    </div>`;
    const inp=ov.querySelector('#cn-i');if(inp)inp.focus();
  }

  root.appendChild(ov);
}

window.closeModal=function(){S.modal=null;renderModal()};
window.openCatPlan=function(catId){S.modal={type:'cat-plan',catId};renderModal()};
window.removePlanItem=function(catId,idx){
  const cat=S.categories.find(c=>c.id===catId);if(cat){cat.plan.splice(idx,1);saveState();render();S.modal={type:'cat-plan',catId};renderModal();}
};
window.addPlanItem=function(catId){
  const inp=document.getElementById('pi-input');if(!inp||!inp.value.trim())return;
  const cat=S.categories.find(c=>c.id===catId);
  if(cat){cat.plan.push({id:'p'+Date.now(),text:inp.value.trim()});saveState();render();S.modal={type:'cat-plan',catId};renderModal();}
};
window.selColor=function(el){document.querySelectorAll('.cswatch').forEach(s=>s.classList.remove('sel'));el.classList.add('sel')};
window.saveCat=function(){
  const name=document.getElementById('cn-i')?.value?.trim();if(!name)return;
  const sel=document.querySelector('.cswatch.sel');
  const color=sel?.dataset?.c||COLS[0];const bg=sel?.dataset?.bg||BG_COLS[0];
  const days=[...document.querySelectorAll('.dck:checked')].map(c=>parseInt(c.value));
  if(!days.length){alert('Выберите хотя бы один день');return}
  S.categories.push({id:'c'+Date.now(),name,color,bg,days,plan:[]});
  saveState();S.modal=null;renderModal();render();
};

function updatePeriodLabel(){
  const lbl=document.getElementById('period-lbl');
  if(S.view==='week'){
    const days=wdays(S.anchor);const s=days[0],e=days[6];
    lbl.textContent=s.getMonth()===e.getMonth()?`${s.getDate()}–${e.getDate()} ${MONTHS_G[s.getMonth()]} ${s.getFullYear()}`:`${s.getDate()} ${MONTHS_G[s.getMonth()]} – ${e.getDate()} ${MONTHS_G[e.getMonth()]}`;
  }else{lbl.textContent=`${MONTHS_N[S.anchor.getMonth()]} ${S.anchor.getFullYear()}`}
}

function render(){
  renderCatsBar();renderSummary();updatePeriodLabel();
  if(S.view==='week')renderWeek();else renderMonth();
}

document.getElementById('prev-btn').onclick=()=>{S.anchor=S.view==='week'?add(S.anchor,-7):new Date(S.anchor.getFullYear(),S.anchor.getMonth()-1,1);render()};
document.getElementById('next-btn').onclick=()=>{S.anchor=S.view==='week'?add(S.anchor,7):new Date(S.anchor.getFullYear(),S.anchor.getMonth()+1,1);render()};
document.getElementById('today-btn').onclick=()=>{S.anchor=new Date();render()};
document.getElementById('wb').onclick=()=>{S.view='week';document.getElementById('wb').classList.add('active');document.getElementById('mb').classList.remove('active');render()};
document.getElementById('mb').onclick=()=>{S.view='month';document.getElementById('mb').classList.add('active');document.getElementById('wb').classList.remove('active');render()};
render();
</script>
</body>
