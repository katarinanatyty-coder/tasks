<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Планировщик дел</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8f8f6;color:#1a1a18;min-height:100vh;padding:1.25rem}
:root{
  --color-background-primary:#ffffff;
  --color-background-secondary:#f1efe8;
  --color-text-primary:#1a1a18;
  --color-text-secondary:#5f5e5a;
  --color-border-tertiary:rgba(0,0,0,.1);
  --color-border-secondary:rgba(0,0,0,.2);
  --color-border-primary:rgba(0,0,0,.3);
  --border-radius-md:8px;
  --border-radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --color-background-primary:#1e1e1c;
    --color-background-secondary:#2a2a28;
    --color-text-primary:#f0ede6;
    --color-text-secondary:#9b9a95;
    --color-border-tertiary:rgba(255,255,255,.1);
    --color-border-secondary:rgba(255,255,255,.18);
    --color-border-primary:rgba(255,255,255,.28);
  }
  body{background:#141412;color:#f0ede6}
}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.app{max-width:1100px;margin:0 auto}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;gap:8px;flex-wrap:wrap}
.nav-grp{display:flex;align-items:center;gap:6px}
.btn{background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:5px 11px;font-size:12px;cursor:pointer;color:var(--color-text-primary);display:inline-flex;align-items:center;gap:5px;transition:background .12s}
.btn:hover{background:var(--color-background-secondary)}
.btn-icon{background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:5px 9px;cursor:pointer;color:var(--color-text-primary);display:inline-flex;align-items:center;transition:background .12s}
.btn-icon:hover{background:var(--color-background-secondary)}
.period-lbl{font-size:14px;font-weight:500;color:var(--color-text-primary);min-width:155px;text-align:center}
.view-toggle{display:flex;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);overflow:hidden}
.vbtn{background:transparent;border:none;padding:5px 13px;font-size:12px;cursor:pointer;color:var(--color-text-secondary);transition:background .12s}
.vbtn.active{background:var(--color-background-secondary);color:var(--color-text-primary);font-weight:500}
.cats-bar{display:flex;gap:6px;margin-bottom:.75rem;flex-wrap:wrap;align-items:center}
.cpill{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:20px;font-size:11px;font-weight:500;border:0.5px solid transparent;cursor:pointer;transition:opacity .15s}
.cpill.off{opacity:.35}
.add-cat-btn{background:transparent;border:0.5px dashed var(--color-border-secondary);border-radius:20px;padding:3px 11px;font-size:11px;cursor:pointer;color:var(--color-text-secondary);display:inline-flex;align-items:center;gap:4px}
.add-cat-btn:hover{border-color:var(--color-border-primary);color:var(--color-text-primary)}
.dash{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px;margin-bottom:.9rem}
.dcard{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:.85rem 1rem;cursor:pointer;transition:border-color .12s}
.dcard:hover{border-color:var(--color-border-secondary)}
.dcard-head{display:flex;align-items:center;gap:8px;margin-bottom:.65rem}
.dcard-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dcard-name{font-size:13px;font-weight:500;color:var(--color-text-primary);flex:1}
.dcard-edit{font-size:11px;color:var(--color-text-secondary);opacity:0;transition:opacity .12s}
.dcard:hover .dcard-edit{opacity:1}
.deadline-badge{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500;display:inline-block;margin-top:4px}
.dl-ok{background:#E1F5EE;color:#085041}
.dl-warn{background:#FAEEDA;color:#633806}
.dl-over{background:#FCEBEB;color:#791F1F}
.time-ring{display:flex;align-items:center;gap:10px;margin-bottom:.6rem}
.ring-info{flex:1}
.ring-pct{font-size:20px;font-weight:500;color:var(--color-text-primary);line-height:1}
.ring-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.stat-row{display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-secondary);padding:3px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
.stat-row:last-child{border-bottom:none}
.stat-val{font-weight:500;color:var(--color-text-primary)}
.sv-warn{color:#BA7517}
.sv-ok{color:#1D9E75}
.week-grid{display:grid;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden;margin-bottom:.75rem}
.gh{background:var(--color-background-secondary);padding:7px 5px;text-align:center;border-bottom:0.5px solid var(--color-border-tertiary);border-right:0.5px solid var(--color-border-tertiary)}
.gh:last-child{border-right:none}
.dn{font-size:10px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.4px}
.dd{font-size:16px;font-weight:500;color:var(--color-text-primary);line-height:1.2;margin-top:1px}
.gh.th .dd{color:#fff;background:#534AB7;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:2px auto 0;font-size:13px}
.row-lbl{padding:6px 8px;border-right:0.5px solid var(--color-border-tertiary);border-bottom:0.5px solid var(--color-border-tertiary);display:flex;flex-direction:column;gap:3px;min-width:0}
.rl-name{font-size:11px;font-weight:500;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rl-week{font-size:10px;color:var(--color-text-secondary)}
.day-cell{border-right:0.5px solid var(--color-border-tertiary);border-bottom:0.5px solid var(--color-border-tertiary);padding:4px;min-height:72px;cursor:pointer;transition:background .1s;position:relative}
.day-cell:last-child{border-right:none}
.day-cell.tc{background:rgba(83,74,183,.07)}
.day-cell.inactive{background:var(--color-background-secondary);cursor:default;opacity:.4}
.day-cell:not(.inactive):hover{background:var(--color-background-secondary)}
.log-chip{font-size:10px;padding:2px 6px;border-radius:3px;margin-bottom:2px;display:flex;align-items:center;gap:4px;cursor:pointer}
.log-chip:hover .del-x{opacity:1}
.del-x{opacity:0;font-size:9px;transition:opacity .12s;flex-shrink:0;border:none;background:transparent;cursor:pointer;color:inherit;padding:0;line-height:1}
.add-log{font-size:10px;color:var(--color-text-secondary);display:flex;align-items:center;gap:2px;opacity:0;transition:opacity .15s;cursor:pointer;padding:2px 3px;border-radius:3px;margin-top:1px;border:none;background:transparent}
.day-cell:not(.inactive):hover .add-log{opacity:1}
.add-log:hover{background:var(--color-border-tertiary)}
.cell-total{font-size:9px;color:var(--color-text-secondary);position:absolute;bottom:3px;right:4px}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);overflow:hidden}
.mgh{background:var(--color-background-secondary);padding:6px;text-align:center;border-bottom:0.5px solid var(--color-border-tertiary);border-right:0.5px solid var(--color-border-tertiary);font-size:10px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.3px}
.mgh:last-child{border-right:none}
.mcell{border-right:0.5px solid var(--color-border-tertiary);border-bottom:0.5px solid var(--color-border-tertiary);padding:5px;min-height:68px;cursor:pointer;transition:background .1s}
.mcell:nth-child(7n){border-right:none}
.mcell:hover{background:var(--color-background-secondary)}
.mcell.om .mdate{opacity:.3}
.mcell.tm .mdate span{background:#534AB7;color:#fff;width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center}
.mdate{font-size:12px;font-weight:500;color:var(--color-text-primary);margin-bottom:3px}
.mbars{display:flex;flex-direction:column;gap:2px;margin-top:2px}
.mbar-r{display:flex;align-items:center;gap:3px}
.mbar-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.mbar-w{flex:1;height:3px;background:var(--color-border-tertiary);border-radius:2px;overflow:hidden}
.mbar-f{height:100%;border-radius:2px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.4);display:flex;align-items:flex-start;justify-content:center;z-index:1000;padding:60px 16px 16px}
.modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-secondary);padding:1.25rem 1.5rem;width:360px;max-width:100%;max-height:85vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:500;margin-bottom:.85rem}
.fld{margin-bottom:.6rem}
.fld label{display:block;font-size:11px;color:var(--color-text-secondary);margin-bottom:3px}
.fld input,.fld select{width:100%;padding:7px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px}
.fld-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.cswatch-row{display:flex;gap:7px;flex-wrap:wrap}
.cswatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .12s}
.cswatch.sel{border-color:var(--color-text-primary)}
.dck-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:3px}
.dck{display:flex;align-items:center;gap:3px;font-size:11px;cursor:pointer}
.dck input{width:11px;height:11px;cursor:pointer}
.mact{display:flex;gap:7px;justify-content:flex-end;margin-top:.85rem}
.log-list{display:flex;flex-direction:column;gap:4px;margin:.4rem 0 .7rem}
.log-row{display:flex;align-items:center;gap:8px;padding:5px 8px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);font-size:12px}
.log-row .lr-time{font-weight:500;color:var(--color-text-primary);white-space:nowrap}
.log-row .lr-note{flex:1;color:var(--color-text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.log-row .lr-del{cursor:pointer;color:var(--color-text-secondary);font-size:11px;flex-shrink:0;border:none;background:transparent;padding:2px}
.log-row .lr-del:hover{color:var(--color-text-primary)}
</style>
</head>
<body>
<div class="app">
<h1 class="sr-only">Планировщик дел с трекингом времени и дедлайнами</h1>
<div class="toolbar">
  <div class="nav-grp">
    <button class="btn-icon" id="prev-btn" title="Назад"><i class="ti ti-chevron-left"></i></button>
    <span class="period-lbl" id="period-lbl"></span>
    <button class="btn-icon" id="next-btn" title="Вперёд"><i class="ti ti-chevron-right"></i></button>
    <button class="btn" id="today-btn"><i class="ti ti-calendar-event"></i> Сегодня</button>
  </div>
  <div class="view-toggle">
    <button class="vbtn active" id="wb">Неделя</button>
    <button class="vbtn" id="mb">Месяц</button>
  </div>
</div>
<div class="cats-bar" id="cats-bar"></div>
<div class="dash" id="dash"></div>
<div id="main-grid"></div>
<div id="modal-root"></div>
</div>

<script>
const DAYS=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'];
const MG=['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
const MN=['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
const COLS=['#534AB7','#1D9E75','#D85A30','#D4537E','#378ADD','#639922','#BA7517'];
const BGS=['#EEEDFE','#E1F5EE','#FAECE7','#FBEAF0','#E6F1FB','#EAF3DE','#FAEEDA'];

const DEFAULT_CATS=[
  {id:'c1',name:'Книга',color:'#534AB7',bg:'#EEEDFE',days:[1,2,3,4,5],goalHours:20,weeklyHours:2,deadline:'',plan:[{id:'p1',text:'Читать 30 мин'},{id:'p2',text:'Конспект главы'}]},
  {id:'c2',name:'Java',color:'#1D9E75',bg:'#E1F5EE',days:[1,3,5],goalHours:40,weeklyHours:3,deadline:'',plan:[{id:'p3',text:'Теория (1 час)'},{id:'p4',text:'Практика — задача'}]},
  {id:'c3',name:'Спорт',color:'#D85A30',bg:'#FAECE7',days:[2,4,6],goalHours:0,weeklyHours:0,deadline:'',plan:[{id:'p5',text:'Тренировка 45 мин'}]},
];

function loadState(){
  try{
    const raw=localStorage.getItem('planner_v2');
    if(raw){const p=JSON.parse(raw);return{categories:p.categories||DEFAULT_CATS,timeLogs:p.timeLogs||{},fact:p.fact||{}};}
  }catch(e){}
  return{categories:DEFAULT_CATS,timeLogs:{},fact:{}};
}
function saveState(){
  try{localStorage.setItem('planner_v2',JSON.stringify({categories:S.categories,timeLogs:S.timeLogs,fact:S.fact}));}catch(e){}
}

const saved=loadState();
const S={
  view:'week',anchor:new Date(),activeCats:null,modal:null,
  categories:saved.categories,
  timeLogs:saved.timeLogs,
  fact:saved.fact,
};

function td(){return new Date(new Date().setHours(0,0,0,0))}
function dk(d){return `${d.getFullYear()}-${String(d.getMonth()).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function wstart(d){const r=new Date(d);const dw=r.getDay()||7;r.setDate(r.getDate()-dw+1);r.setHours(0,0,0,0);return r}
function addD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r}
function wdays(a){const s=wstart(a);return Array.from({length:7},(_,i)=>addD(s,i))}

function fmtMin(m){
  m=Math.round(m);
  const h=Math.floor(m/60),mn=m%60;
  return h>0?(mn>0?h+'ч '+mn+'м':h+'ч'):mn+'м';
}
function parseMin(str){
  str=str.trim();let total=0;
  const hm=str.match(/(\d+(?:[.,]\d+)?)\s*[чh]/i);
  const mm=str.match(/(\d+)\s*[мm]/i);
  if(hm)total+=parseFloat(hm[1].replace(',','.'))*60;
  if(mm)total+=parseInt(mm[1]);
  if(!hm&&!mm){const n=parseFloat(str.replace(',','.'));if(!isNaN(n))total=n*60;}
  return Math.round(total);
}

function tlKey(catId,dateK){return catId+'||'+dateK}
function getLogs(catId,dateK){return S.timeLogs[tlKey(catId,dateK)]||[]}
function addLog(catId,dateK,mins,note){
  const k=tlKey(catId,dateK);
  if(!S.timeLogs[k])S.timeLogs[k]=[];
  S.timeLogs[k].push({id:'l'+Date.now(),mins,note:note||''});
  saveState();render();
}
function delLog(catId,dateK,idx){
  const k=tlKey(catId,dateK);
  if(S.timeLogs[k]){S.timeLogs[k].splice(idx,1);saveState();render();}
}
function totalLoggedMins(catId){
  let t=0;
  Object.keys(S.timeLogs).forEach(k=>{if(k.startsWith(catId+'||'))S.timeLogs[k].forEach(l=>t+=l.mins)});
  return t;
}
function weekLoggedMins(catId,anchor){
  const days=wdays(anchor);let t=0;
  days.forEach(d=>getLogs(catId,dk(d)).forEach(l=>t+=l.mins));
  return t;
}
function dayLoggedMins(catId,dateK){return getLogs(catId,dateK).reduce((a,l)=>a+l.mins,0)}

function daysUntilDeadline(deadline){
  if(!deadline)return null;
  const dl=new Date(deadline);dl.setHours(23,59,59);
  return Math.ceil((dl-new Date())/86400000);
}
function deadlineBadge(days){
  if(days===null)return '';
  if(days<0)return '<span class="deadline-badge dl-over">просрочено '+Math.abs(days)+'д</span>';
  if(days<=7)return '<span class="deadline-badge dl-warn">'+days+'д до дедлайна</span>';
  return '<span class="deadline-badge dl-ok">'+days+'д до дедлайна</span>';
}
function neededPerDay(cat){
  if(!cat.deadline||!cat.goalHours)return null;
  const dl=new Date(cat.deadline);
  const daysLeft=Math.ceil((dl-new Date())/86400000);
  if(daysLeft<=0)return null;
  const remainMin=cat.goalHours*60-totalLoggedMins(cat.id);
  if(remainMin<=0)return 0;
  return Math.round(remainMin/daysLeft);
}

function visCats(){if(!S.activeCats)return S.categories;return S.categories.filter(c=>S.activeCats.includes(c.id))}

function renderCatsBar(){
  const bar=document.getElementById('cats-bar');bar.innerHTML='';
  S.categories.forEach(cat=>{
    const on=!S.activeCats||S.activeCats.includes(cat.id);
    const p=document.createElement('span');
    p.className='cpill'+(on?'':' off');
    p.style.background=cat.bg;p.style.color=cat.color;p.style.borderColor=cat.color+'44';
    p.innerHTML='<span style="width:8px;height:8px;border-radius:50%;background:'+cat.color+';display:inline-block"></span>'+cat.name;
    p.onclick=()=>{
      if(!S.activeCats){S.activeCats=[cat.id];}
      else{
        const i=S.activeCats.indexOf(cat.id);
        if(i>=0){S.activeCats=S.activeCats.filter(x=>x!==cat.id);if(!S.activeCats.length)S.activeCats=null;}
        else{S.activeCats=[...S.activeCats,cat.id];if(S.activeCats.length===S.categories.length)S.activeCats=null;}
      }
      render();
    };
    bar.appendChild(p);
  });
  const ab=document.createElement('button');ab.className='add-cat-btn';
  ab.innerHTML='<i class="ti ti-plus"></i> Категория';
  ab.onclick=()=>{S.modal={type:'add-cat'};renderModal()};
  bar.appendChild(ab);
}

function renderDash(){
  const el=document.getElementById('dash');el.innerHTML='';
  visCats().forEach(cat=>{
    const goalMin=cat.goalHours*60;
    const doneMin=totalLoggedMins(cat.id);
    const pct=goalMin>0?Math.min(100,Math.round(doneMin/goalMin*100)):0;
    const daysLeft=daysUntilDeadline(cat.deadline);
    const nd=neededPerDay(cat);
    const wkMin=weekLoggedMins(cat.id,S.anchor);
    const wkGoalMin=(cat.weeklyHours||0)*60;
    const wkPct=wkGoalMin>0?Math.min(100,Math.round(wkMin/wkGoalMin*100)):null;
    const r=44,cx=26,cy=26,sw=4;
    const circ=2*Math.PI*r;
    const off=circ-(pct/100)*circ;
    const card=document.createElement('div');card.className='dcard';
    card.setAttribute('role','button');card.setAttribute('tabindex','0');
    card.title='Настройки категории';
    card.onclick=()=>{S.modal={type:'cat-settings',catId:cat.id};renderModal()};
    let html='<div class="dcard-head"><span class="dcard-dot" style="background:'+cat.color+'"></span><span class="dcard-name">'+cat.name+'</span><i class="ti ti-settings dcard-edit" style="font-size:13px"></i></div>';
    if(goalMin>0){
      html+='<div class="time-ring"><svg width="52" height="52" viewBox="0 0 52 52" aria-hidden="true"><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke-width="'+sw+'" stroke="'+cat.color+'22"/><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke-width="'+sw+'" stroke="'+cat.color+'" stroke-dasharray="'+circ.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'" stroke-linecap="round" transform="rotate(-90 '+cx+' '+cy+')"/></svg><div class="ring-info"><div class="ring-pct">'+pct+'%</div><div class="ring-sub">'+fmtMin(doneMin)+' из '+fmtMin(goalMin)+'</div>'+(cat.deadline?deadlineBadge(daysLeft):'')+'</div></div>';
      html+='<div class="stat-row"><span>Осталось</span><span class="stat-val '+(doneMin>=goalMin?'sv-ok':'')+'">'+((doneMin>=goalMin)?'Готово!':fmtMin(goalMin-doneMin))+'</span></div>';
      if(nd!==null)html+='<div class="stat-row"><span>Нужно в день</span><span class="stat-val '+(nd>120?'sv-warn':'')+'">'+((nd===0)?'Готово!':fmtMin(nd))+'</span></div>';
      if(wkPct!==null)html+='<div class="stat-row"><span>Эта неделя</span><span class="stat-val">'+fmtMin(wkMin)+' / '+fmtMin(wkGoalMin)+' ('+wkPct+'%)</span></div>';
    }else{
      html+='<div class="stat-row"><span>За неделю</span><span class="stat-val">'+fmtMin(wkMin)+'</span></div>';
      html+='<div class="stat-row"><span>Всего</span><span class="stat-val">'+fmtMin(doneMin)+'</span></div>';
      html+='<div style="font-size:11px;color:var(--color-text-secondary);margin-top:6px">Нажми для настройки цели и дедлайна</div>';
    }
    card.innerHTML=html;
    el.appendChild(card);
  });
}

function renderWeek(){
  const grid=document.getElementById('main-grid');grid.innerHTML='';
  const g=document.createElement('div');g.className='week-grid';
  g.style.gridTemplateColumns='76px repeat(7,1fr)';
  const today=td();const days=wdays(S.anchor);const cats=visCats();
  const corner=document.createElement('div');corner.className='gh';corner.style.textAlign='left';
  corner.innerHTML='<span class="dn" style="font-size:9px">Категория</span>';g.appendChild(corner);
  days.forEach((d,i)=>{
    const h=document.createElement('div');h.className='gh'+(d.getTime()===today.getTime()?' th':'');
    h.innerHTML='<div class="dn">'+DAYS[i]+'</div><div class="dd">'+d.getDate()+'</div>';g.appendChild(h);
  });
  cats.forEach(cat=>{
    const wkMin=weekLoggedMins(cat.id,S.anchor);
    const wkGoalMin=(cat.weeklyHours||0)*60;
    const lbl=document.createElement('div');lbl.className='row-lbl';
    let lblHTML='<div style="display:flex;align-items:center;gap:5px"><span style="width:7px;height:7px;border-radius:50%;background:'+cat.color+';flex-shrink:0"></span><span class="rl-name">'+cat.name+'</span></div>';
    lblHTML+='<div class="rl-week">'+fmtMin(wkMin)+(wkGoalMin>0?' / '+fmtMin(wkGoalMin):'')+'</div>';
    if(wkGoalMin>0)lblHTML+='<div style="height:3px;background:var(--color-border-tertiary);border-radius:2px;overflow:hidden"><div style="height:100%;width:'+Math.min(100,Math.round(wkMin/wkGoalMin*100))+'%;background:'+cat.color+';border-radius:2px"></div></div>';
    lblHTML+='<button style="font-size:9px;color:var(--color-text-secondary);background:transparent;border:0.5px solid var(--color-border-tertiary);border-radius:4px;padding:2px 4px;cursor:pointer;margin-top:2px" onclick="openCatPlan(\''+cat.id+'\')"><i class="ti ti-list" style="font-size:10px"></i> план</button>';
    lbl.innerHTML=lblHTML;g.appendChild(lbl);
    days.forEach(d=>{
      const dow=d.getDay()||7;const active=cat.days.includes(dow);
      const dateK=dk(d);
      const cell=document.createElement('div');
      cell.className='day-cell'+(d.getTime()===today.getTime()?' tc':'')+(active?'':' inactive');
      if(active){
        const logs=getLogs(cat.id,dateK);
        const dayMin=dayLoggedMins(cat.id,dateK);
        logs.forEach((log,li)=>{
          const chip=document.createElement('div');chip.className='log-chip';
          chip.style.background=cat.bg;chip.style.color=cat.color;
          const delBtn=document.createElement('button');delBtn.className='del-x';
          delBtn.innerHTML='<i class="ti ti-x" style="font-size:9px"></i>';
          delBtn.onclick=(e)=>{e.stopPropagation();delLog(cat.id,dateK,li);S.modal&&S.modal.type==='log-time'&&(S.modal={type:'log-time',catId:cat.id,dateK},renderModal())};
          chip.innerHTML='<span style="font-weight:500">'+fmtMin(log.mins)+'</span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--color-text-secondary)">'+log.note+'</span>';
          chip.appendChild(delBtn);
          cell.appendChild(chip);
        });
        if(dayMin>0){const tot=document.createElement('div');tot.className='cell-total';tot.textContent=fmtMin(dayMin);cell.appendChild(tot);}
        const addBtn=document.createElement('button');addBtn.className='add-log';
        addBtn.innerHTML='<i class="ti ti-plus" style="font-size:10px"></i> время';
        addBtn.onclick=(e)=>{e.stopPropagation();S.modal={type:'log-time',catId:cat.id,dateK};renderModal()};
        cell.appendChild(addBtn);
        cell.onclick=()=>{S.modal={type:'log-time',catId:cat.id,dateK};renderModal()};
      }
      g.appendChild(cell);
    });
  });
  grid.appendChild(g);
}

function renderMonth(){
  const grid=document.getElementById('main-grid');grid.innerHTML='';
  const g=document.createElement('div');g.className='month-grid';
  const today=td();const year=S.anchor.getFullYear(),month=S.anchor.getMonth();
  const first=new Date(year,month,1);const last=new Date(year,month+1,0);
  const startDow=(first.getDay()||7)-1;
  DAYS.forEach(d=>{const h=document.createElement('div');h.className='mgh';h.textContent=d;g.appendChild(h)});
  for(let i=0;i<startDow;i++){const c=document.createElement('div');c.className='mcell om';const pd=new Date(year,month,1-startDow+i);c.innerHTML='<div class="mdate">'+pd.getDate()+'</div>';g.appendChild(c)}
  const cats=visCats();
  for(let d=1;d<=last.getDate();d++){
    const date=new Date(year,month,d);const isT=date.getTime()===today.getTime();
    const cell=document.createElement('div');cell.className='mcell'+(isT?' tm':'');
    const dateK=dk(date);
    cell.innerHTML='<div class="mdate"><span>'+d+'</span></div>';
    const barsDiv=document.createElement('div');barsDiv.className='mbars';
    const dow=date.getDay()||7;
    cats.forEach(cat=>{
      if(cat.days.includes(dow)){
        const mins=dayLoggedMins(cat.id,dateK);
        const dayGoal=cat.weeklyHours?cat.weeklyHours/5*60:0;
        const pct=dayGoal>0?Math.min(100,Math.round(mins/dayGoal*100)):mins>0?100:0;
        const row=document.createElement('div');row.className='mbar-r';
        row.innerHTML='<div class="mbar-dot" style="background:'+cat.color+'88"></div><div class="mbar-w"><div class="mbar-f" style="width:'+pct+'%;background:'+cat.color+'"></div></div>';
        barsDiv.appendChild(row);
      }
    });
    cell.appendChild(barsDiv);
    cell.onclick=()=>{S.anchor=date;S.view='week';document.getElementById('wb').classList.add('active');document.getElementById('mb').classList.remove('active');updatePeriodLabel();render()};
    g.appendChild(cell);
  }
  const tot=startDow+last.getDate();const rem=tot%7===0?0:7-tot%7;
  for(let i=1;i<=rem;i++){const c=document.createElement('div');c.className='mcell om';c.innerHTML='<div class="mdate">'+i+'</div>';g.appendChild(c)}
  grid.appendChild(g);
}

function renderModal(){
  const root=document.getElementById('modal-root');root.innerHTML='';
  if(!S.modal)return;
  const m=S.modal;
  const ov=document.createElement('div');ov.className='modal-overlay';
  ov.onclick=(e)=>{if(e.target===ov){S.modal=null;renderModal()}};

  if(m.type==='log-time'){
    const cat=S.categories.find(c=>c.id===m.catId);if(!cat)return;
    const logs=getLogs(cat.id,m.dateK);
    const dayMin=dayLoggedMins(cat.id,m.dateK);
    const totalMin=totalLoggedMins(cat.id);
    const goalMin=cat.goalHours*60;
    let logHTML=logs.length?logs.map((l,i)=>'<div class="log-row"><span class="lr-time">'+fmtMin(l.mins)+'</span><span class="lr-note">'+(l.note||'—')+'</span><button class="lr-del" onclick="doDelLog(\''+cat.id+'\',\''+m.dateK+'\','+i+')"><i class="ti ti-trash" style="font-size:11px"></i></button></div>').join(''):'<div style="font-size:11px;color:var(--color-text-secondary);padding:4px 0">Нет записей за этот день</div>';
    let sumHTML='';
    if(dayMin>0)sumHTML='<div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:.5rem">За день: <strong style="color:var(--color-text-primary)">'+fmtMin(dayMin)+'</strong>'+(goalMin>0?' · Всего: <strong style="color:var(--color-text-primary)">'+fmtMin(totalMin)+' / '+fmtMin(goalMin)+'</strong>')+'</div>';
    ov.innerHTML='<div class="modal"><h3 style="color:'+cat.color+'"><i class="ti ti-clock" style="font-size:15px"></i> '+cat.name+' — '+m.dateK+'</h3>'+sumHTML+'<div class="log-list" id="log-list">'+logHTML+'</div><div class="fld"><label>Время (примеры: 1.5, 40м, 1ч 20м)</label><input id="log-time-inp" placeholder="напр. 1ч 30м или 1.5" autocomplete="off"/></div><div class="fld"><label>Заметка (необязательно)</label><input id="log-note-inp" placeholder="Глава 5, задача по стримам..."/></div><div class="mact"><button class="btn" onclick="closeModal()">Закрыть</button><button class="btn" style="border-color:'+cat.color+';color:'+cat.color+'" onclick="submitLog(\''+cat.id+'\',\''+m.dateK+'\')"><i class="ti ti-plus"></i> Списать</button></div></div>';
    root.appendChild(ov);
    const ti=document.getElementById('log-time-inp');
    if(ti){ti.focus();ti.addEventListener('keydown',e=>{if(e.key==='Enter')submitLog(cat.id,m.dateK)});}
    document.getElementById('log-note-inp')?.addEventListener('keydown',e=>{if(e.key==='Enter')submitLog(cat.id,m.dateK)});
  }

  if(m.type==='cat-settings'){
    const cat=S.categories.find(c=>c.id===m.catId);if(!cat)return;
    ov.innerHTML='<div class="modal"><h3 style="color:'+cat.color+'"><i class="ti ti-target" style="font-size:15px"></i> Настройки — '+cat.name+'</h3><div class="fld"><label>Название</label><input id="cs-name" value="'+cat.name+'"/></div><div class="fld-row"><div class="fld"><label>Цель (часов всего)</label><input id="cs-goal" type="number" min="0" step="0.5" value="'+(cat.goalHours||0)+'" placeholder="0 = без цели"/></div><div class="fld"><label>Норма/неделю (ч)</label><input id="cs-weekly" type="number" min="0" step="0.5" value="'+(cat.weeklyHours||0)+'"/></div></div><div class="fld"><label>Дедлайн</label><input id="cs-deadline" type="date" value="'+(cat.deadline||'')+'"/></div><div class="fld"><label>Дни недели</label><div class="dck-row">'+DAYS.map((d,i)=>'<label class="dck"><input type="checkbox" class="dck-inp" value="'+(i+1)+'" '+(cat.days.includes(i+1)?'checked':'')+'/>'+ d+'</label>').join('')+'</div></div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:.85rem"><button class="btn" style="border-color:#E24B4A;color:#A32D2D;font-size:11px" onclick="deleteCat(\''+cat.id+'\')"><i class="ti ti-trash" style="font-size:12px"></i> Удалить</button><div style="display:flex;gap:7px"><button class="btn" onclick="closeModal()">Отмена</button><button class="btn" style="border-color:'+cat.color+';color:'+cat.color+'" onclick="saveCatSettings(\''+cat.id+'\')"><i class="ti ti-check"></i> Сохранить</button></div></div></div>';
    root.appendChild(ov);
  }

  if(m.type==='cat-plan'){
    const cat=S.categories.find(c=>c.id===m.catId);if(!cat)return;
    const ph=cat.plan.length?cat.plan.map((p,i)=>'<div class="log-row"><span class="lr-note">'+p.text+'</span><button class="lr-del" onclick="removePlan(\''+cat.id+'\','+i+')"><i class="ti ti-trash" style="font-size:11px"></i></button></div>').join(''):'<div style="font-size:11px;color:var(--color-text-secondary);padding:4px 0">Нет задач</div>';
    ov.innerHTML='<div class="modal"><h3 style="color:'+cat.color+'"><i class="ti ti-list" style="font-size:15px"></i> Задачи плана — '+cat.name+'</h3><div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:.5rem">Задачи отображаются в ячейках недели. Трекинг времени — независимо.</div><div class="log-list" id="plan-list">'+ph+'</div><div class="fld"><label>Новая задача</label><input id="plan-inp" placeholder="Что делать в каждый день..." autocomplete="off"/></div><div class="mact"><button class="btn" onclick="closeModal()">Закрыть</button><button class="btn" style="border-color:'+cat.color+';color:'+cat.color+'" onclick="addPlan(\''+cat.id+'\')"><i class="ti ti-plus"></i> Добавить</button></div></div>';
    root.appendChild(ov);
    const inp=document.getElementById('plan-inp');
    if(inp){inp.focus();inp.addEventListener('keydown',e=>{if(e.key==='Enter')addPlan(cat.id)});}
  }

  if(m.type==='add-cat'){
    ov.innerHTML='<div class="modal"><h3>Новая категория</h3><div class="fld"><label>Название</label><input id="nc-name" placeholder="Python, Медитация..." autocomplete="off"/></div><div class="fld"><label>Цвет</label><div class="cswatch-row">'+COLS.map((c,i)=>'<div class="cswatch'+(i===0?' sel':'')+'" style="background:'+c+'" data-c="'+c+'" data-bg="'+BGS[i]+'" onclick="selColor(this)"></div>').join('')+'</div></div><div class="fld-row"><div class="fld"><label>Цель (часов всего)</label><input id="nc-goal" type="number" min="0" step="0.5" value="0" placeholder="0 = без цели"/></div><div class="fld"><label>Норма/неделю (ч)</label><input id="nc-weekly" type="number" min="0" step="0.5" value="0"/></div></div><div class="fld"><label>Дедлайн</label><input id="nc-deadline" type="date"/></div><div class="fld"><label>Дни недели</label><div class="dck-row">'+DAYS.map((d,i)=>'<label class="dck"><input type="checkbox" class="dck-inp" value="'+(i+1)+'" '+(i<5?'checked':'')+'/>'+ d+'</label>').join('')+'</div></div><div class="mact"><button class="btn" onclick="closeModal()">Отмена</button><button class="btn" style="border-color:#534AB7;color:#534AB7" onclick="saveNewCat()"><i class="ti ti-check"></i> Создать</button></div></div>';
    root.appendChild(ov);
    const inp=document.getElementById('nc-name');if(inp)inp.focus();
  }
}

window.closeModal=function(){S.modal=null;renderModal()};
window.submitLog=function(catId,dateK){
  const ti=document.getElementById('log-time-inp');const ni=document.getElementById('log-note-inp');
  if(!ti||!ti.value.trim()){if(ti)ti.style.outline='2px solid #E24B4A';return;}
  const mins=parseMin(ti.value);
  if(!mins||mins<=0){ti.style.outline='2px solid #E24B4A';ti.focus();return;}
  addLog(catId,dateK,mins,(ni?.value?.trim()||''));
  S.modal={type:'log-time',catId,dateK};renderModal();
};
window.doDelLog=function(catId,dateK,idx){delLog(catId,dateK,idx);S.modal={type:'log-time',catId,dateK};renderModal()};
window.openCatPlan=function(catId){S.modal={type:'cat-plan',catId};renderModal()};
window.removePlan=function(catId,idx){const cat=S.categories.find(c=>c.id===catId);if(cat){cat.plan.splice(idx,1);saveState();render();S.modal={type:'cat-plan',catId};renderModal();}};
window.addPlan=function(catId){
  const inp=document.getElementById('plan-inp');if(!inp||!inp.value.trim())return;
  const cat=S.categories.find(c=>c.id===catId);
  if(cat){cat.plan.push({id:'p'+Date.now(),text:inp.value.trim()});saveState();render();S.modal={type:'cat-plan',catId};renderModal();}
};
window.saveCatSettings=function(catId){
  const cat=S.categories.find(c=>c.id===catId);if(!cat)return;
  const name=document.getElementById('cs-name')?.value?.trim();
  if(name)cat.name=name;
  cat.goalHours=parseFloat(document.getElementById('cs-goal')?.value)||0;
  cat.weeklyHours=parseFloat(document.getElementById('cs-weekly')?.value)||0;
  cat.deadline=document.getElementById('cs-deadline')?.value||'';
  const days=[...document.querySelectorAll('.dck-inp:checked')].map(c=>parseInt(c.value));
  if(days.length)cat.days=days;
  saveState();S.modal=null;render();renderModal();
};
window.deleteCat=function(catId){
  if(!confirm('Удалить категорию вместе со всеми записями?'))return;
  S.categories=S.categories.filter(c=>c.id!==catId);
  Object.keys(S.timeLogs).forEach(k=>{if(k.startsWith(catId+'||'))delete S.timeLogs[k]});
  saveState();S.modal=null;render();renderModal();
};
window.selColor=function(el){document.querySelectorAll('.cswatch').forEach(s=>s.classList.remove('sel'));el.classList.add('sel')};
window.saveNewCat=function(){
  const name=document.getElementById('nc-name')?.value?.trim();if(!name){document.getElementById('nc-name')?.focus();return;}
  const sel=document.querySelector('.cswatch.sel');
  const color=sel?.dataset?.c||COLS[0];const bg=sel?.dataset?.bg||BGS[0];
  const goalHours=parseFloat(document.getElementById('nc-goal')?.value)||0;
  const weeklyHours=parseFloat(document.getElementById('nc-weekly')?.value)||0;
  const deadline=document.getElementById('nc-deadline')?.value||'';
  const days=[...document.querySelectorAll('.dck-inp:checked')].map(c=>parseInt(c.value));
  if(!days.length){alert('Выберите хотя бы один день');return}
  S.categories.push({id:'c'+Date.now(),name,color,bg,days,goalHours,weeklyHours,deadline,plan:[]});
  saveState();S.modal=null;render();renderModal();
};

function updatePeriodLabel(){
  const lbl=document.getElementById('period-lbl');
  if(S.view==='week'){
    const days=wdays(S.anchor);const s=days[0],e=days[6];
    lbl.textContent=s.getMonth()===e.getMonth()?s.getDate()+'–'+e.getDate()+' '+MG[s.getMonth()]+' '+s.getFullYear():s.getDate()+' '+MG[s.getMonth()]+' – '+e.getDate()+' '+MG[e.getMonth()];
  }else{lbl.textContent=MN[S.anchor.getMonth()]+' '+S.anchor.getFullYear()}
}
function render(){renderCatsBar();renderDash();updatePeriodLabel();if(S.view==='week')renderWeek();else renderMonth();}

document.getElementById('prev-btn').onclick=()=>{S.anchor=S.view==='week'?addD(S.anchor,-7):new Date(S.anchor.getFullYear(),S.anchor.getMonth()-1,1);render()};
document.getElementById('next-btn').onclick=()=>{S.anchor=S.view==='week'?addD(S.anchor,7):new Date(S.anchor.getFullYear(),S.anchor.getMonth()+1,1);render()};
document.getElementById('today-btn').onclick=()=>{S.anchor=new Date();render()};
document.getElementById('wb').onclick=()=>{S.view='week';document.getElementById('wb').classList.add('active');document.getElementById('mb').classList.remove('active');render()};
document.getElementById('mb').onclick=()=>{S.view='month';document.getElementById('mb').classList.add('active');document.getElementById('wb').classList.remove('active');render()};
render();
</script>
</body>
</html>
